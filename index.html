
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>iSPACE Program Request Portal</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background:#f5f8ff;
    color:#111;
}

/* TOP BAR */
.topbar{
    background: linear-gradient(90deg, #003a78, #0056b3);
    color:white;
    padding:18px 25px;
    font-size:18px;
    font-weight:bold;
    letter-spacing:0.5px;
}

/* PAGE WRAP */
.wrapper{
    max-width:1200px;
    margin:30px auto;
    padding:0 20px;
}

/* FORM CARD */
.card{
    background:white;
    border-radius:14px;
    box-shadow:0 8px 25px rgba(0,0,0,0.08);
    overflow:hidden;
}

/* TITLE STRIP */
.card-header{
    padding:20px;
    background:#ffffff;
    border-bottom:1px solid #eee;
}

.card-header h2{
    margin:0;
    font-size:22px;
    color:#003a78;
}

/* IMPORTANT: MAKE FORM FEEL FULL PAGE */
iframe{
    width:100%;
    height:1400px; /* key change: removes “tiny window feel” */
    border:none;
}

/* FOOTER */
.footer{
    text-align:center;
    font-size:12px;
    color:#777;
    padding:25px;
}

@media(max-width:768px){
    iframe{
        height:1600px;
    }
}

</style>
</head>

<body>

<div class="topbar">
    iSPACE Program Request Portal
</div>

<div class="wrapper">

    <div class="card">

        <div class="card-header">
            <h2>Program Interest Submission Form</h2>
        </div>

        <iframe
            src="https://forms.office.com/Pages/ResponsePage.aspx?id=2HRd3aAFzUSOewz0OSqt2R1kjIrbCLlGj_vMVPmSC41UQTdRRkkzM0JNRTFZTjFTSDhQQ0VCS1NKUS4u&embed=true">
        </iframe>

    </div>

</div>

<div class="footer">
    © iSPACE Programs
</div>

</body>
</html>
